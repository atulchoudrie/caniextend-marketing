<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Main house body -->
  <rect x="4" y="14" width="16" height="14" fill="none" stroke="#7BAFD4" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Roof -->
  <polyline points="2,14 12,6 22,14" fill="none" stroke="#7BAFD4" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Extension (dashed gold) -->
  <rect x="20" y="18" width="8" height="10" fill="rgba(200,155,60,0.15)" stroke="#C89B3C" stroke-width="1.5" stroke-dasharray="3 1.5" stroke-linejoin="round"/>
  <!-- Door -->
  <rect x="9" y="20" width="5" height="8" fill="none" stroke="#7BAFD4" stroke-width="1"/>
</svg>
